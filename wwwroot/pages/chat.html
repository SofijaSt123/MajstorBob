<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poruke - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="meni-container"></div>

<div class="container mt-4">
    <div class="mb-4">
        <h2 class="mb-0 tekst-crven">
            <i class="fa-solid fa-comments"></i> Razgovori
        </h2>
    </div>
    
    <div class="chat-container">
        <div class="chat-lista">
            <div class="p-3 bg-warning bg-opacity-25 border-bottom">
                <i class="fa-solid fa-magnifying-glass tekst-crven"></i>
                <input type="text" id="pretragaChat" class="form-control mt-2" placeholder="Pretraži razgovore...">
            </div>
            <div id="listaRazgovora">
                <div class="p-4 text-center tekst-crven">Učitavanje razgovora...</div>
            </div>
        </div>

        <div class="chat-prozor">
            <div id="chatHeader" class="chat-header">
                <div class="text-center">
                    <i class="fa-solid fa-circle-user fa-2x ikonica-crvena"></i>
                    <h4 id="chatImeSagovornika" class="mt-2 tekst-crven mb-0">-</h4>
                </div>
            </div>
            
            <div id="chatPoruke" class="chat-poruke">
                <div class="prazno-stanje">
                    <i class="fa-solid fa-comment-dots fa-3x mb-3"></i>
                    <p>Izaberite razgovor sa leve strane</p>
                </div>
            </div>
            
            <div id="chatInputArea" class="chat-input-area" style="display: none;">
                <input type="text" id="novaPoruka" placeholder="Napišite poruku..." class="form-control">
                <button id="posaljiPorukuBtn" class="btn dugme">
                    <i class="fa-solid fa-paper-plane"></i> Pošalji
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/chat.js"></script>

</body>
</html>
