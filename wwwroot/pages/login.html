<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="meni-container"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="kartica-login">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-circle-user fa-3x ikonica-crvena"></i>
                    <h2 class="mt-2 tekst-crven">Prijava</h2>
                    <p class="tekst-dobrodoslica mt-2">Dobrodošli nazad!</p>
                </div>

                <div id="alertMessage"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label oznaka-polja">Email adresa</label>
                        <input type="email" id="email" class="form-control" placeholder="vas@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label oznaka-polja">Lozinka</label>
                        <input type="password" id="password" class="form-control" placeholder="******" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label oznaka-checkbox" for="rememberMe">Zapamti me</label>
                    </div>
                    <button type="submit" class="btn dugme w-100">Prijavi se</button>
                </form>

                <div class="text-center mt-3">
                    <a href="register.html" class="link-crveni">Nemate nalog? Registrujte se</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const alertDiv = document.getElementById('alertMessage');
        
        alertDiv.innerHTML = '<div class="alert alert-info"><i class="fa-solid fa-spinner fa-spin"></i> Prijavljivanje...</div>';
        
        const result = await login(email, password);
        
        if (!result.success) {
            alertDiv.innerHTML = '<div class="alert alert-danger"><i class="fa-solid fa-triangle-exclamation"></i> ' + result.message + '</div>';
            return;
        }
        
        localStorage.setItem('tip_korisnika', result.data.tip_korisnika);
        localStorage.setItem('korisnik_id', result.data.id);
        
        const token = localStorage.getItem('token');
        
        if (token) {
            const decoded = parseJwt(token);
            console.log('Dekodiran token:', decoded);
            
            const korisnikId = decoded['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/sid'] || 
                                decoded['sid'] || 
                                decoded['nameid'] ||
                                result.data.id;
            
            try {
                const response = await fetch(`${API_BASE}/Korisnici/id/${korisnikId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const korisnik = await response.json();
                    console.log('Podaci o korisniku iz API-ja:', korisnik);
                    
                    localStorage.setItem('user_ime', korisnik.ime || 'Korisnik');
                    localStorage.setItem('user_prezime', korisnik.prezime || 'Korisnik');
                    localStorage.setItem('user_email', korisnik.email || email);
                    localStorage.setItem('user_telefon', korisnik.telefon || 'Nije uneto');
                    localStorage.setItem('user_datum_registracije', korisnik.datum_registracije ? korisnik.datum_registracije.split('T')[0] : new Date().toISOString().split('T')[0]);
                    
                    if (korisnik.grad) {
                        localStorage.setItem('klijent_grad', korisnik.grad);
                    }
                    
                    if (korisnik.cena) {
                        localStorage.setItem('user_cena', korisnik.cena);
                    }
                    if (korisnik.radno_vreme) {
                        localStorage.setItem('user_radno_vreme', korisnik.radno_vreme);
                    }
                } else {
                    console.warn('API ne vraća podatke, koristim token podatke');
                    const ime = decoded['given_name'] || decoded['ime'] || 'Korisnik';
                    const prezime = decoded['family_name'] || decoded['prezime'] || 'Korisnik';
                    const emailIzTokena = decoded['email'] || email;
                    
                    localStorage.setItem('user_ime', ime);
                    localStorage.setItem('user_prezime', prezime);
                    localStorage.setItem('user_email', emailIzTokena);
                }
            } catch (apiError) {
                console.error('Greška pri pozivanju API-ja:', apiError);
                const ime = decoded['given_name'] || decoded['ime'] || 'Korisnik';
                const prezime = decoded['family_name'] || decoded['prezime'] || 'Korisnik';
                const emailIzTokena = decoded['email'] || email;
                
                localStorage.setItem('user_ime', ime);
                localStorage.setItem('user_prezime', prezime);
                localStorage.setItem('user_email', emailIzTokena);
            }
        } else {
            localStorage.setItem('user_ime', 'Korisnik');
            localStorage.setItem('user_prezime', 'Korisnik');
            localStorage.setItem('user_email', email);
        }
        
        const redirectUrl = result.data.redirectUrl || 'index.html';
        
        alertDiv.innerHTML = '<div class="alert alert-success">' + result.message + '</div>';
        setTimeout(() => {
            window.location.href = redirectUrl;
        }, 1500);
    });
</script>

</body>
</html>
