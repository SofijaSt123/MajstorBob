<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje rezervacije - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="meni-container"></div>

<div class="container mt-4">
    <h2 class="mb-4 tekst-crven"><i class="fa-solid fa-calendar-check"></i> Moje rezervacije</h2>

    <div class="kartica-filter mb-4">
        <div class="row">
            <div class="col-md-3">
                <select id="filterStatus" class="form-select">
                    <option value="sve">Sve rezervacije</option>
                    <option value="pending">Na čekanju</option>
                    <option value="confirmed">Potvrđene</option>
                    <option value="rejected">Odbijene</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="filtrirajBtn" class="btn dugme w-100"><i class="fa-solid fa-filter"></i> Filtriraj</button>
            </div>
        </div>
    </div>

    <div class="kartica-crvena p-3">
        <div class="table-responsive">
            <table class="table tabela-majstori">
                <thead>
                    <tr>
                        <th>Majstor</th>
                        <th>Datum</th>
                        <th>Vreme</th>
                        <th>Status</th>
                        <th>Ponuda</th>
                        <th>Plaćanje</th>
                    </tr>
                </thead>
                <tbody id="tabelaRezervacija">
                    <tr><td colspan="6" class="text-center">Učitavanje rezervacija...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalPonuda" class="modal-prijava">
    <div class="modal-content">
        <div class="desna-kartica p-3">
            <h5 class="mb-3 tekst-crven"><i class="fa-solid fa-file-invoice-dollar"></i> Ponuda majstora</h5>
            <div class="info-red"><span class="oznaka-polja">Cena (donja granica):</span><span id="modalCenaDonja" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Cena (gornja granica):</span><span id="modalCenaGornja" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Procena trajanja:</span><span id="modalTrajanje" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Komentar majstora:</span><span id="modalKomentarMajstor" class="tekst-crven">-</span></div>
            <div class="d-flex gap-2 mt-3">
                <button class="btn dugme" onclick="odbijPonudu()"><i class="fa-solid fa-times"></i> Odbij ponudu</button>
                <button class="btn dugme" onclick="prihvatiPonudu()"><i class="fa-solid fa-check"></i> Prihvati ponudu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/moje_rezervacije.js"></script>

</body>
</html>
