<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moji termini - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="meni-container"></div>

<div class="container mt-4">
    <h2 class="mb-4 tekst-crven"><i class="fa-solid fa-calendar-check"></i> Moji termini</h2>

    <div class="kartica-filter mb-4">
        <div class="row">
            <div class="col-md-3">
                <select id="filterStatus" class="form-select">
                    <option value="sve">Svi termini</option>
                    <option value="pending">Na čekanju</option>
                    <option value="confirmed">Potvrđeni</option>
                    <option value="rejected">Odbijeni</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="filtrirajBtn" class="btn dugme w-100"><i class="fa-solid fa-filter"></i> Filtriraj</button>
            </div>
        </div>
    </div>

    <div class="kartica-crvena p-3">
        <div class="table-responsive">
            <table class="table tabela-majstori">
                <thead>
                    <tr>
                        <th>Klijent</th>
                        <th>Datum</th>
                        <th>Vreme</th>
                        <th>Opis</th>
                        <th>Adresa</th>
                        <th>Status</th>
                        <th>Akcije</th>
                    </tr>
                </thead>
                <tbody id="tabelaTermina">
                    <tr><td colspan="7" class="text-center">Učitavanje termina...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalDetaljiTermina" class="modal-prijava">
    <div class="modal-content">
        <div class="desna-kartica p-3">
            <h5 class="mb-3 tekst-crven"><i class="fa-solid fa-circle-info"></i> Detalji termina</h5>
            <div class="info-red"><span class="oznaka-polja">Klijent:</span><span id="modalKlijent" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Datum:</span><span id="modalDatum" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Vreme:</span><span id="modalVreme" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Opis radova:</span><span id="modalOpis" class="tekst-crven">-</span></div>
            <div class="info-red"><span class="oznaka-polja">Adresa:</span><span id="modalAdresa" class="tekst-crven">-</span></div>
            <div class="d-flex justify-content-center mt-3">
                <button class="btn dugme" onclick="zatvoriModalDetalji()"><i class="fa-solid fa-times"></i> Zatvori</button>
            </div>
        </div>
    </div>
</div>

<div id="modalPrihvati" class="modal-prijava">
    <div class="modal-content" style="max-width: 500px;">
        <div class="desna-kartica p-3">
            <h5 class="mb-3 tekst-crven"><i class="fa-solid fa-check-circle"></i> Prihvati termin</h5>
            
            <div class="mb-3">
                <label class="oznaka-polja">Datum izvođenja</label>
                <input type="date" id="datumIzvodjenja" class="form-control">
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="oznaka-polja">Početak</label>
                    <input type="time" id="pocetakRadova" class="form-control" value="08:00">
                </div>
                <div class="col-md-6">
                    <label class="oznaka-polja">Kraj</label>
                    <input type="time" id="krajRadova" class="form-control" value="16:00">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="oznaka-polja">Donja granica cene (EUR)</label>
                <input type="number" id="cenaDonja" class="form-control" placeholder="npr. 100" step="1" min="0">
            </div>
            <div class="mb-3">
                <label class="oznaka-polja">Gornja granica cene (EUR)</label>
                <input type="number" id="cenaGornja" class="form-control" placeholder="npr. 200" step="1" min="0">
            </div>
            <div class="mb-3">
                <label class="oznaka-polja">Dodatni komentar</label>
                <textarea id="komentarMajstor" class="form-control" rows="3" placeholder="npr. Materijal nije uključen..."></textarea>
            </div>
            
            <div class="d-flex gap-2">
                <button class="btn dugme" onclick="zatvoriModalPrihvati()"><i class="fa-solid fa-times"></i> Otkaži</button>
                <button class="btn dugme" onclick="posaljiPonudu()"><i class="fa-solid fa-paper-plane"></i> Pošalji ponudu</button>
            </div>
        </div>
    </div>
</div>

<div id="modalKonacnaCena" class="modal-prijava">
    <div class="modal-content" style="max-width: 500px;">
        <div class="desna-kartica p-3">
            <h5 class="mb-3 tekst-crven"><i class="fa-solid fa-coins"></i> Postavi konačnu cenu</h5>
            
            <div class="info-red mb-2">
                <span class="oznaka-polja">Klijent:</span>
                <span id="modalKonacnaKlijent" class="tekst-crven">-</span>
            </div>
            
            <div class="mb-3">
                <label class="oznaka-polja">Konačna cena (EUR):</label>
                <input type="number" id="konacnaCenaInput" class="form-control" placeholder="Unesite konačnu cenu..." min="0" step="100">
            </div>
            
            <div class="mb-3">
                <label class="oznaka-polja">Način plaćanja:</label>
                <select id="nacinPlacanjaSelect" class="form-select">
                    <option value="kes">Keš (odmah plaćeno)</option>
                    <option value="kartica">Kartica (klijent plaća)</option>
                </select>
            </div>
            
            <div class="d-flex gap-2">
                <button class="btn dugme" onclick="zatvoriModalKonacnaCena()"><i class="fa-solid fa-times"></i> Otkaži</button>
                <button class="btn dugme" onclick="sacuvajKonacnuCenu()"><i class="fa-solid fa-save"></i> Sačuvaj cenu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/moji_termini.js"></script>

</body>
</html>
