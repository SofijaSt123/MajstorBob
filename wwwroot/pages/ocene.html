<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocenite majstora - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
<div id="meni-container"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="kartica-crvena p-4">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-star fa-3x ikonica-zuta"></i>
                    <h2 id="ocenaNaslov" class="tekst-zut">Ocenite majstora</h2>
                    <p class="tekst-zut" id="majstorInfo">Učitavanje...</p>
                </div> 

                <div id="alertMessage"></div>

                <form id="ocenaForma">
                    <input type="hidden" id="majstorId">

                    <div class="text-center mb-2">
                        <label class="oznaka-polja-zuto">Cena usluge</label>
                        <div class="zvezdice" data-field="cena"></div>
                    </div>

                    <div class="text-center mb-2">
                        <label class="oznaka-polja-zuto">Kvalitet rada</label>
                        <div class="zvezdice" data-field="kvalitet"></div>
                    </div>

                    <div class="text-center mb-2">
                        <label class="oznaka-polja-zuto">Brzina izvršenja</label>
                        <div class="zvezdice" data-field="brzina"></div>
                    </div>

                    <div class="text-center mb-2">
                        <label class="oznaka-polja-zuto">Odnos prema klijentu</label>
                        <div class="zvezdice" data-field="odnos"></div>
                    </div>

                    <div class="mb-3">
                        <label class="oznaka-polja-zuto">Vaša recenzija</label>
                        <textarea id="recenzija" class="form-control" rows="4" placeholder="Napišite vaše iskustvo..." required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" id="odustaniBtn" class="btn dugme flex-grow-1">
                            <i class="fa-solid fa-circle-arrow-left"></i> Odustani
                        </button>
                        <button type="submit" class="btn dugme flex-grow-1">
                            <i class="fa-solid fa-paper-plane"></i> Pošalji ocenu
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="../js/main.js"></script> 
<script src="../js/ocene.js"></script>
<script src="../js/api.js"></script>
</body>
</html>
