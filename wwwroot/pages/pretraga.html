<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretraga majstora - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="meni-container"></div> 

<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="kartica-filter">
                <h5 class="mb-3 tekst-crven"><i class="fa-solid fa-filter tekst-crven"></i> Filteri</h5>
                <div class="mb-3">
                    <label class="oznaka-filter tekst-crven">Vrsta usluge</label>
                    <select id="filterKategorija" class="form-select" required>
                        <option value="" disabled selected>-- Izaberite vrstu usluge --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="oznaka-filter tekst-crven">Grad</label>
                    <select id="filterGrad" class="form-select" required>
                        <option value="" disabled selected>-- Izaberite grad --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="oznaka-filter tekst-crven">Doplata</label>
                    <select id="filterDoplata" class="form-select" required>
                        <option value="" disabled selected>-- Izaberite --</option>
                        <option value="da">Sa doplatom</option>
                        <option value="ne">Bez doplate</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="oznaka-filter tekst-crven">Minimalna prosečna ocena</label>
                    <select id="filterOcena" class="form-select">
                        <option value="0">Sve ocene</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                    </select>
                </div>

                <button id="pretraziDugme" class="btn dugme w-100"><i class="fa-brands fa-sistrix"></i> Pretraži</button>
            </div>
        </div>

        <div class="col-md-9">
            <div class="kartica-crvena p-3">
                <div class="table-responsive">
                    <table class="table table-hover tabela-majstori">
                        <thead>
                            <tr>
                                <th>Naziv</th>
                                <th>Kategorija</th>
                                <th>Grad</th>
                                <th>Doplata</th>
                                <th>Ocena</th>
                                <th>Akcija</th>
                            </tr>
                        </thead>
                        <tbody id="rezultatiPretrage">
                            <tr><td colspan="6" class="text-center py-4"><i class="fa-brands fa-sistrix fa-2x"></i><p class="mt-2">Izaberite kriterijume za pretragu</p></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div> 
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script> 
<script src="../js/pretraga.js"></script>
</body>
</html>
