<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakazivanje - MajstorBob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="meni-container"></div>

<div class="container mt-4"> 
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="kartica-crvena p-4">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-calendar-check fa-3x ikonica-zuta"></i>
                    <h2 class="tekst-zut">Zakažite uslugu</h2>
                    <p class="tekst-zut" id="majstorInfo">Učitavanje...</p>
                </div>

                <div id="alertMessage"></div>

                <form id="zakazivanjeForma">
                    <input type="hidden" id="majstorId">

                    <div class="mb-3">
                        <label class="oznaka-polja tekst-zut">Izaberite datum</label>
                        <input type="date" id="datum" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="oznaka-polja tekst-zut">Izaberite vreme</label>
                        <input type="time" id="vreme" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="oznaka-polja tekst-zut">Adresa radova</label>
                        <input type="text" id="adresa" class="form-control" placeholder="Ulica i broj, grad" required>
                    </div>

                    <div class="mb-3">
                        <label class="oznaka-polja tekst-zut">Opis radova</label>
                        <textarea id="opisRadova" class="form-control" rows="4" placeholder="Opišite šta treba da se uradi..." required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" id="odustaniBtn" class="btn dugme flex-grow-1">
                            <i class="fa-solid fa-circle-arrow-left"></i> Odustani
                        </button>
                        <button type="submit" class="btn dugme flex-grow-1">
                            <i class="fa-solid fa-paper-plane"></i> Pošalji zahtev
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/zakazivanje.js"></script>

</body> 
</html>
